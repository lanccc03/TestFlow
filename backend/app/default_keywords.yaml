- name: wait
  description: 等待指定秒数
  module: flow
  parameters:
    - name: seconds
      description: 等待时长，单位秒
      type: integer
      default: 1
      required: true
      example: 5
  example:
    seconds: 5
  enabled: true
- name: log.message
  description: 记录执行日志消息
  module: flow
  parameters:
    - name: message
      description: 日志内容
      type: string
      default: ""
      required: true
      example: 系统已进入测试状态
  example:
    message: 系统已进入测试状态
  enabled: true
